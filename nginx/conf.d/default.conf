# ============================================================
# Upstream – Next.js app
# ============================================================
upstream nextjs_upstream {
    server app:3000;
    keepalive 64;
}

# ============================================================
# HTTP → redirect ke HTTPS (uncomment setelah SSL aktif)
# ============================================================
server {
    listen 80;
    server_name catetin.co www.catetin.co;

    # Certbot challenge (jangan dihapus)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Sebelum SSL: proxy langsung ke app
    # Setelah SSL aktif: uncomment block redirect di bawah & comment block location /
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Uncomment ini setelah SSL aktif ──
    # location / {
    #     return 301 https://$host$request_uri;
    # }
}

